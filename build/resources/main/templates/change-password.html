<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambia Password</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="center-container">
  <h1>Cambia Password</h1>
  <form action="/change-password" method="POST" class="form-container">
    <div class="form-group">
      <label for="oldPassword">Vecchia Password:</label>
      <input type="password" id="oldPassword" name="oldPassword" required minlength="5" maxlength="20" title="La vecchia password deve essere lunga tra 5 e 20 caratteri.">
    </div>

    <div class="form-group">
      <label for="newPassword">Nuova Password:</label>
      <input type="password" id="newPassword" name="newPassword" required minlength="5" maxlength="20" title="La nuova password deve essere lunga tra 5 e 20 caratteri.">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn">Aggiorna Password</button>
      <button type="button" class="btn cancel-btn" onclick="window.location.href='/home';">Torna alla Home</button>
    </div>
  </form>

  <!-- Messaggi -->
  <div th:if="${error}" class="error-message">
    <p th:text="${error}"></p>
  </div>
  <div th:if="${success}" class="success-message">
    <p th:text="${success}"></p>
  </div>

</div>
</body>
</html>
